name: Build Turnip MV Frost GlibC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            meson \
            ninja-build \
            python3-mako \
            python3-yaml \
            pkg-config \
            zstd \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libdrm-dev \
            libexpat1-dev

      - name: Clone Mesa
        run: |
          git clone --depth=1 https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Verify clone
        run: |
          ls -la
          ls -la mesa

      - name: Generate cross file
        shell: bash
        run: |
          cat <<EOF > aarch64-linux.txt
          [binaries]
          c='aarch64-linux-gnu-gcc'
          cpp='aarch64-linux-gnu-g++'
          ar='aarch64-linux-gnu-ar'
          strip='aarch64-linux-gnu-strip'
          pkgconfig='pkg-config'

          [host_machine]
          system='linux'
          cpu_family='aarch64'
          cpu='aarch64'
          endian='little'
          EOF

      - name: Configure Mesa
        run: |
          meson setup build mesa \
            --cross-file=aarch64-linux.txt \
            -Dvulkan-drivers=freedreno \
            -Dgallium-drivers= \
            -Dplatforms=x11 \
            -Dbuildtype=release

      - name: Build
        run: |
          ninja -C build

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/meson-logs
