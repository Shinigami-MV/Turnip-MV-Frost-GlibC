name: Build Turnip MV Eclipse Base Frost GlibC

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Eclipse Base
    runs-on: ubuntu-20.04

    env:
      DRIVER_NAME: Turnip MV Eclipse Base (Frost GlibC)
      DRIVER_VERSION: Eclipse-Base-Frost-GlibC
      MESA_VERSION: mesa-25.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git \
            build-essential \
            meson \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            python3-mako \
            python3-yaml \
            python3-ply \
            libdrm-dev \
            libexpat1-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-sync-dev \
            libxcb-xfixes0-dev \
            libxshmfence-dev \
            libzstd-dev \
            zlib1g-dev \
            zstd \
            file \
            binutils

      - name: Clone Mesa source
        run: |
          git clone \
            https://gitlab.freedesktop.org/mesa/mesa.git \
            mesa

          cd mesa
          git checkout "${MESA_VERSION}"

          echo "Mesa version:"
          git describe --tags --always

          echo "Mesa commit:"
          git rev-parse HEAD

      - name: Prepare scripts
        run: |
          chmod +x scripts/build.sh
          chmod +x scripts/package.sh

      - name: Build Turnip MV Eclipse Base
        run: |
          scripts/build.sh

      - name: Package Frost GlibC driver
        run: |
          scripts/package.sh

      - name: Inspect generated binary
        run: |
          echo "Driver information:"
          file install/package/usr/lib/libvulkan_freedreno.so

          echo "Dynamic dependencies:"
          ldd install/package/usr/lib/libvulkan_freedreno.so || true

          echo "ELF dynamic section:"
          readelf -d install/package/usr/lib/libvulkan_freedreno.so || true

          echo "Generated files:"
          find output -maxdepth 2 -type f -print

      - name: Upload Eclipse Base driver
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-MV-Eclipse-Base-Frost-GlibC
          path: |
            output/turnip-MV-Eclipse-Base-Frost-GlibC.tzst
            output/SHA256SUMS.txt
            output/build-info.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Turnip-MV-Eclipse-Base-build-logs
          path: |
            build/meson-logs/
          if-no-files-found: ignore
          retention-days: 14
